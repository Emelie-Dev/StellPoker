name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Soroban contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check workspace
        run: cargo check --workspace

      - name: Test poker-table contract
        run: cargo test -p poker-table

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  circuits:
    name: Noir circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/refs/heads/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
          $HOME/.nargo/bin/noirup -v 1.0.0-beta.17

      - name: Check circuits compile
        run: |
          for circuit in deal_valid reveal_board_valid showdown_valid; do
            echo "Checking $circuit..."
            (cd circuits/$circuit && nargo check)
          done

      - name: Run Noir library tests
        run: cd circuits/lib && nargo test

  frontend:
    name: Next.js frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Lint
        run: cd app && npm run lint

      - name: Build
        run: cd app && npm run build
        env:
          NEXT_PUBLIC_COORDINATOR_URL: http://localhost:8080
